# Example Wrangler config for a Redtuma app using Durable Object memory.
# Copy into your app as `wrangler.toml` and adjust names.

name = "my-redtuma-agent"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# One Durable Object class backs agent memory. Each conversation thread maps to
# one DO instance via `env.MEMORY.idFromName(threadId)`.
[[durable_objects.bindings]]
name = "MEMORY"
class_name = "Memory"

[[migrations]]
tag = "v1"
new_classes = ["Memory"]

[vars]
# ANTHROPIC_API_KEY is better set as a secret: `wrangler secret put ANTHROPIC_API_KEY`
